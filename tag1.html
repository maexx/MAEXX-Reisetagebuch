<!DOCTYPE html>
<html>

<head>
  <title>Tag 1 – Ankunft</title>

  <style>

.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 40px;
  cursor: pointer;
  padding: 10px;
}

.prev {
  left: 20px;
}

.next {
  right: 20px;
}
    
.gallery img {
  cursor: pointer;
}

#lightbox {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}


#lightbox-img {
  width: auto;
  height: auto;
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

    
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 40px;
}
    

.gallery img {
  transition: transform 0.2s;
}

.gallery img:hover {
  transform: scale(1.05);
}
    
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 20px;
}

@media (max-width: 700px) {
  .gallery {
    grid-template-columns: 1fr;
  }
}
    
.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}
    
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: white;
    }

    .container > img {
  width: 100%;
  border-radius: 10px;
}

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #0077cc;
    }
  </style>



  
</head>

<script>
let images = [
  "images/IMG_1344.PNG",
  "images/IMG_3966.jpeg",
  "images/IMG_3967.jpeg",
  "images/IMG_3968.jpeg",
  "images/IMG_3970.jpeg",
  "images/IMG_3974.jpeg"
];

let currentIndex = 0;

function openLightbox(src) {
  currentIndex = images.indexOf(src.split("/").pop().startsWith("IMG") ? "images/" + src.split("/").pop() : src);
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function nextImage() {
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function prevImage() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}
</script>
  
<body>

 <body>

  <div class="container">
    <h1>Tag 1 – Ankunft</h1>

    <!-- 📸 Galerie -->
    <div class="gallery">
      <img src="images/IMG_1344.PNG" onclick="openLightbox(this.src)">
      <img src="images/IMG_3966.jpeg" onclick="openLightbox(this.src)">
      ...
    </div>

    <!-- 🔥 HIER kommt die Lightbox rein -->
    <div id="lightbox" onclick="closeLightbox()">
      <span class="close">&times;</span>

      <span class="prev" onclick="event.stopPropagation(); prevImage()">❮</span>
      <img id="lightbox-img">
      <span class="next" onclick="event.stopPropagation(); nextImage()">❯</span>
    </div>

  </div>

</body>
 
<div class="gallery">
  <img src="images/IMG_1344.PNG" onclick="openLightbox(this.src)" alt="Bilbao Spinne">
  <img src="images/IMG_3966.jpeg" onclick="openLightbox(this.src)" alt="Reisebild">
  <img src="images/IMG_3967.jpeg" onclick="openLightbox(this.src)" alt="Reisebild">
  <img src="images/IMG_3968.jpeg" onclick="openLightbox(this.src)" alt="Reisebild">
  <img src="images/IMG_3970.jpeg" onclick="openLightbox(this.src)" alt="Reisebild">
  <img src="images/IMG_3974.jpeg" onclick="openLightbox(this.src)" alt="Reisebild">
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>
    <p>
      Ankunft in Bilbao. Erste Eindrücke, riesige Spinne 😄  
      Stadt wirkt entspannt, Wetter etwas grau.
    </p>

    <a href="index.html">← Zurück zur Startseite</a>
  </div>

</body>
</html>
